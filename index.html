<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Gemini Voice AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:        #f7f7f8;
  --bg2:       #ffffff;
  --panel:     #ffffff;
  --panel2:    #f3f3f5;
  --border:    #e8e8ec;
  --border2:   #d8d8de;
  --green:     #16a34a;
  --green-bg:  #f0fdf4;
  --green-bd:  #bbf7d0;
  --blue:      #2563eb;
  --blue-bg:   #eff6ff;
  --blue-bd:   #bfdbfe;
  --amber:     #d97706;
  --amber-bg:  #fffbeb;
  --violet:    #7c3aed;
  --violet-bg: #f5f3ff;
  --red:       #dc2626;
  --text:      #111118;
  --text2:     #44444f;
  --sub:       #76767f;
  --muted:     #b0b0bb;
  --ff:        'Instrument Serif', Georgia, serif;
  --sans:      'Inter', system-ui, sans-serif;
  --r:         12px;
  --r-sm:      8px;
  --shadow:    0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
}

html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5;}

/* ── Shell ── */
.shell{
  display:grid;
  grid-template-columns:300px 1fr 270px;
  grid-template-rows:58px 1fr;
  grid-template-areas:"topbar topbar topbar" "left center right";
  height:100vh;
}

/* ── Topbar ── */
.topbar{
  grid-area:topbar;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  box-shadow:var(--shadow);
  z-index:20;position:relative;
}

.brand{display:flex;align-items:center;gap:10px;}
.brand-icon{
  width:32px;height:32px;border-radius:9px;
  background:linear-gradient(135deg,#4f46e5,#7c3aed);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(79,70,229,.3);
}
.brand-icon svg{width:16px;height:16px;color:#fff;}
.brand-name{font-family:var(--ff);font-size:1.15rem;color:var(--text);letter-spacing:-.01em;}
.brand-name span{font-style:italic;color:#4f46e5;}

/* State pill */
.state-pill{
  position:absolute;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:7px;
  padding:6px 16px;border-radius:100px;
  background:var(--panel2);border:1px solid var(--border2);
  font-size:.7rem;font-weight:500;letter-spacing:.04em;
  color:var(--sub);transition:all .3s;
  box-shadow:var(--shadow);
}
.state-pill.online {background:var(--green-bg);border-color:var(--green-bd);color:var(--green);}
.state-pill.listen {background:var(--blue-bg);border-color:var(--blue-bd);color:var(--blue);}
.state-pill.speak  {background:var(--amber-bg);border-color:#fde68a;color:var(--amber);}
.state-pill.think  {background:var(--violet-bg);border-color:#ddd6fe;color:var(--violet);}
.pill-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;}
.state-pill.online .pill-dot,
.state-pill.listen .pill-dot{animation:blink 1.8s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

.topbar-right{display:flex;align-items:center;gap:8px;}
.topbar-badge{
  font-size:.65rem;color:var(--sub);
  padding:4px 10px;border-radius:6px;
  background:var(--panel2);border:1px solid var(--border);
}

/* ── Left panel ── */
.left{
  grid-area:left;
  background:var(--bg2);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}

.panel-title{
  padding:16px 18px 12px;
  font-size:.65rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--sub);border-bottom:1px solid var(--border);flex-shrink:0;
}

.config-body{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:14px;}
.config-body::-webkit-scrollbar{width:3px;}
.config-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

.field label{
  display:block;font-size:.7rem;font-weight:500;color:var(--text2);margin-bottom:6px;
}

textarea,select{
  width:100%;background:var(--panel2);border:1.5px solid var(--border);
  border-radius:var(--r-sm);color:var(--text);font-family:var(--sans);
  font-size:.78rem;line-height:1.55;outline:none;transition:border-color .2s,box-shadow .2s;
}
textarea:focus,select:focus{
  border-color:#4f46e5;
  box-shadow:0 0 0 3px rgba(79,70,229,.08);
}
textarea{padding:10px 12px;resize:vertical;min-height:90px;}
.sel-wrap{position:relative;}
.sel-wrap::after{content:'▾';position:absolute;right:10px;top:50%;transform:translateY(-50%);
  color:var(--sub);pointer-events:none;font-size:.75rem;}
select{padding:9px 28px 9px 10px;appearance:none;cursor:pointer;}

.btn-row{padding:14px 18px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0;}
.btn{
  flex:1;padding:10px 0;border-radius:var(--r-sm);border:none;
  font-family:var(--sans);font-size:.75rem;font-weight:600;
  letter-spacing:.02em;cursor:pointer;transition:all .2s;
}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important;}
.btn-start{background:#4f46e5;color:#fff;box-shadow:0 2px 8px rgba(79,70,229,.25);}
.btn-start:not(:disabled):hover{background:#4338ca;box-shadow:0 4px 14px rgba(79,70,229,.35);transform:translateY(-1px);}
.btn-stop{background:#fff;color:var(--red);border:1.5px solid #fecaca;}
.btn-stop:not(:disabled):hover{background:#fef2f2;border-color:var(--red);}

/* ── Center ── */
.center{
  grid-area:center;
  display:flex;flex-direction:column;
  background:var(--bg);overflow:hidden;
}

/* Orb section */
.orb-section{
  display:flex;flex-direction:column;align-items:center;
  padding:28px 0 20px;flex-shrink:0;
  background:var(--bg2);border-bottom:1px solid var(--border);
  box-shadow:0 2px 8px rgba(0,0,0,.04);
}

.orb-wrap{position:relative;width:120px;height:120px;margin-bottom:14px;}

/* Outer ring */
.orb-ring{
  position:absolute;inset:0;border-radius:50%;
  border:1.5px solid #e0e0f0;
}
.orb-ring:nth-child(2){
  inset:10px;border-color:#ebe8ff;
  animation:rspin 7s linear infinite;
}
@keyframes rspin{to{transform:rotate(360deg)}}

.orb-core{
  position:absolute;inset:18px;border-radius:50%;
  background:#fff;
  border:1.5px solid var(--border2);
  box-shadow:0 4px 20px rgba(79,70,229,.1), var(--shadow);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;transition:box-shadow .4s,border-color .4s;
}
.orb-core.active {border-color:#c4b5fd;box-shadow:0 4px 24px rgba(79,70,229,.2);}
.orb-core.listen {border-color:#93c5fd;box-shadow:0 4px 24px rgba(37,99,235,.2);}
.orb-core.speak  {border-color:#fcd34d;box-shadow:0 4px 24px rgba(217,119,6,.2);}
.orb-core.think  {border-color:#c4b5fd;box-shadow:0 4px 24px rgba(124,58,237,.2);}

#orbCv{position:absolute;inset:0;width:100%;height:100%;border-radius:50%;}

.orb-icon{position:relative;z-index:2;color:#9ca3af;width:26px;height:26px;transition:opacity .3s;}
.orb-core.listen .orb-icon,
.orb-core.speak  .orb-icon,
.orb-core.think  .orb-icon{opacity:0;}

.orb-label{
  font-size:.68rem;font-weight:500;color:var(--sub);
  letter-spacing:.05em;text-transform:uppercase;
  transition:color .3s;
}
.orb-label.active{color:#4f46e5;}
.orb-label.listen{color:var(--blue);}
.orb-label.speak {color:var(--amber);}
.orb-label.think {color:var(--violet);}

/* ── Transcript ── */
.transcript{
  flex:1;overflow-y:auto;
  padding:20px 24px;
  display:flex;flex-direction:column;gap:14px;
}
.transcript::-webkit-scrollbar{width:4px;}
.transcript::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

.tx-empty{
  margin:auto;text-align:center;
  color:var(--muted);font-size:.8rem;line-height:2;
}
.tx-empty strong{
  display:block;font-family:var(--ff);font-size:1.3rem;
  font-style:italic;color:var(--text2);margin-bottom:4px;
  font-weight:400;
}

/* Messages */
.msg{display:flex;gap:10px;animation:msgIn .25s ease both;}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.msg.user{flex-direction:row-reverse;}

.av{
  width:30px;height:30px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:.62rem;font-weight:600;flex-shrink:0;margin-top:2px;
  letter-spacing:.03em;
}
.msg.agent .av{background:#f0eeff;color:#4f46e5;border:1.5px solid #ddd6fe;}
.msg.user  .av{background:#eff6ff;color:var(--blue);border:1.5px solid #bfdbfe;}

.msg-body{display:flex;flex-direction:column;max-width:72%;}
.msg.user .msg-body{align-items:flex-end;}

.bubble{
  padding:11px 15px;border-radius:14px;
  font-size:.82rem;line-height:1.65;
  word-break:break-word;
  direction:ltr;unicode-bidi:plaintext;
}
.msg.agent .bubble{
  background:#fff;border:1.5px solid var(--border);
  border-top-left-radius:4px;color:var(--text);
  box-shadow:var(--shadow);
}
.msg.user .bubble{
  background:#4f46e5;color:#fff;
  border-top-right-radius:4px;
  box-shadow:0 2px 8px rgba(79,70,229,.25);
}

.msg-time{font-size:.6rem;color:var(--muted);margin-top:4px;padding:0 2px;}

/* Typing */
.tdots{display:flex;gap:4px;align-items:center;padding:2px 0;}
.tdots span{
  width:6px;height:6px;border-radius:50%;
  background:#c4b5fd;
  animation:td 1.1s ease-in-out infinite;
}
.tdots span:nth-child(2){animation-delay:.18s;}
.tdots span:nth-child(3){animation-delay:.36s;}
@keyframes td{0%,100%{opacity:.25;transform:scale(.7)}50%{opacity:1;transform:scale(1)}}

/* ── Right panel (Console) ── */
.right{
  grid-area:right;
  background:var(--bg2);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}

.console-head{
  padding:14px 16px 10px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.console-title{font-size:.65rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--sub);}
.console-live{display:flex;align-items:center;gap:5px;font-size:.6rem;color:var(--muted);}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--muted);transition:background .3s;}
.live-dot.on{background:var(--green);animation:blink 1.8s ease-in-out infinite;}

.console-body{
  flex:1;overflow-y:auto;padding:10px 13px;
  display:flex;flex-direction:column;gap:1px;
}
.console-body::-webkit-scrollbar{width:3px;}
.console-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

.log{
  font-size:.62rem;line-height:1.7;
  color:var(--sub);font-family:'Courier New',monospace;
  padding-left:7px;border-left:2px solid transparent;
  word-break:break-all;white-space:pre-wrap;
}
.log.err {color:#dc2626;border-color:#fca5a5;}
.log.warn{color:#d97706;border-color:#fcd34d;}
.log.ok  {color:#16a34a;border-color:#86efac;}
.log.sys {color:#7c3aed;border-color:#c4b5fd;}
.log.info{color:var(--text2);}

.console-foot{
  padding:10px 14px;border-top:1px solid var(--border);
  display:flex;justify-content:flex-end;flex-shrink:0;
}
.btn-clear{
  background:none;border:none;cursor:pointer;
  font-family:var(--sans);font-size:.65rem;font-weight:500;
  color:var(--sub);padding:4px 8px;border-radius:6px;
  transition:all .2s;
}
.btn-clear:hover{background:var(--panel2);color:var(--text);}

/* ── Toast ── */
.toast{
  position:fixed;bottom:20px;left:50%;
  transform:translateX(-50%) translateY(60px);
  background:var(--text);color:#fff;
  border-radius:8px;padding:10px 18px;
  font-size:.73rem;font-weight:500;
  z-index:9999;opacity:0;
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
  white-space:nowrap;box-shadow:var(--shadow-md);
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* ── Divider ── */
.day-divider{
  display:flex;align-items:center;gap:10px;
  font-size:.62rem;color:var(--muted);font-weight:500;
  letter-spacing:.06em;text-transform:uppercase;
  flex-shrink:0;
}
.day-divider::before,.day-divider::after{
  content:'';flex:1;height:1px;background:var(--border);
}
</style>
</head>
<body>
<div class="shell">

  <!-- Topbar -->
  <header class="topbar">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
        </svg>
      </div>
      <span class="brand-name">Gemini <span>Voice</span> AI</span>
    </div>

    <div class="state-pill" id="statePill">
      <div class="pill-dot"></div>
      <span id="pillText">Offline</span>
    </div>

    <div class="topbar-right">
      <span class="topbar-badge">LiveKit · Realtime</span>
    </div>
  </header>

  <!-- Left: Config -->
  <aside class="left">
    <div class="panel-title">Configuration</div>
    <div class="config-body">
      <div class="field">
        <label>System Prompt</label>
        <textarea id="instructions" rows="5">You are a helpful and friendly AI voice assistant. Listen carefully to what the user says and respond naturally in conversation.</textarea>
      </div>
      <div class="field">
        <label>Voice</label>
        <div class="sel-wrap">
          <select id="voice">
            <option value="Puck">Puck — Energetic</option>
            <option value="Charon">Charon — Deep</option>
            <option value="Kore">Kore — Warm</option>
            <option value="Fenrir">Fenrir — Bold</option>
            <option value="Aoede">Aoede — Melodic</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Model</label>
        <div class="sel-wrap">
          <select id="model">
            <option value="gemini-2.5-flash-native-audio-preview-12-2025">Gemini 2.5 Flash</option>
            <option value="gemini-2.0-flash-exp">Gemini 2.0 Flash Exp</option>
          </select>
        </div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-start" id="btnStart" onclick="startAgent()">▶ Start Agent</button>
      <button class="btn btn-stop"  id="btnStop"  onclick="stopAgent()" disabled>■ Stop</button>
    </div>
  </aside>

  <!-- Center: Orb + Transcript -->
  <main class="center">
    <div class="orb-section">
      <div class="orb-wrap">
        <div class="orb-ring"></div>
        <div class="orb-ring"></div>
        <div class="orb-core" id="orbCore">
          <canvas id="orbCv"></canvas>
          <svg class="orb-icon" id="orbIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
          </svg>
        </div>
      </div>
      <div class="orb-label" id="orbLabel">Start the agent to begin</div>
    </div>

    <div class="transcript" id="transcript">
      <div class="tx-empty" id="txEmpty">
        <strong>No messages yet</strong>
        Start the agent and speak to see your conversation here
      </div>
    </div>
  </main>

  <!-- Right: Console -->
  <aside class="right">
    <div class="console-head">
      <span class="console-title">Console</span>
      <div class="console-live">
        <div class="live-dot" id="liveDot"></div>
        <span id="liveText">idle</span>
      </div>
    </div>
    <div class="console-body" id="consoleBody">
      <div class="log sys">Ready — press Start to launch agent</div>
    </div>
    <div class="console-foot">
      <button class="btn-clear" onclick="clearConsole()">Clear</button>
    </div>
  </aside>
</div>

<div class="toast" id="toast"></div>

<script>
/* ── State ── */
const API = 'http://localhost:8000';
let running   = false;
let curState  = 'idle';
let logSSE    = null;
let evtSSE    = null;
let typingEl  = null;
let micStream = null, audioCtx = null, analyser = null;
let animId    = null;
let phase     = 0;

/* ── Canvas ── */
const cv  = document.getElementById('orbCv');
const c2  = cv.getContext('2d');

function resizeCv(){
  const r = document.getElementById('orbCore').getBoundingClientRect();
  cv.width = r.width; cv.height = r.height;
}
window.addEventListener('resize', resizeCv);
setTimeout(resizeCv, 100);

/* ── Mic ── */
async function startMic(){
  try{
    micStream = await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    audioCtx  = new (window.AudioContext||window.webkitAudioContext)();
    const src = audioCtx.createMediaStreamSource(micStream);
    analyser  = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    analyser.smoothingTimeConstant = 0.82;
    src.connect(analyser);
    addLog('Microphone connected','ok');
  } catch(e){ addLog('Mic denied — waveform unavailable','warn'); }
}
function stopMic(){
  if(micStream){micStream.getTracks().forEach(t=>t.stop());micStream=null;}
  if(audioCtx){audioCtx.close();audioCtx=null;analyser=null;}
}

const fd = new Uint8Array(128);
function getVol(){
  if(!analyser) return 0;
  analyser.getByteFrequencyData(fd);
  return Math.min(fd.slice(0,48).reduce((a,b)=>a+b,0)/(48*255),1);
}

/* ── Draw ── */
function draw(){
  const w=cv.width, h=cv.height, cx=w/2, cy=h/2;
  c2.clearRect(0,0,w,h);

  if(!running || curState==='idle'){
    phase+=.015;
    // Gentle idle pulse — soft indigo
    const g=c2.createRadialGradient(cx,cy,0,cx,cy,Math.min(w,h)*.5);
    const a=.06+.03*Math.sin(phase);
    g.addColorStop(0,`rgba(99,102,241,${a})`);
    g.addColorStop(1,'rgba(99,102,241,0)');
    c2.fillStyle=g; c2.fillRect(0,0,w,h);
    return;
  }

  if(curState==='active'){
    phase+=.018;
    const g=c2.createRadialGradient(cx,cy,0,cx,cy,Math.min(w,h)*.45);
    g.addColorStop(0,`rgba(99,102,241,${.08+.04*Math.sin(phase)})`);
    g.addColorStop(1,'rgba(99,102,241,0)');
    c2.fillStyle=g; c2.fillRect(0,0,w,h);
    return;
  }

  if(curState==='listening'){
    // Real mic bars — blue
    if(analyser) analyser.getByteFrequencyData(fd);
    const num=52, innerR=Math.min(w,h)*.28, maxH=Math.min(w,h)*.22;
    for(let i=0;i<num;i++){
      const ang=(i/num)*Math.PI*2-Math.PI/2;
      const amp=fd[Math.floor((i/num)*48)]/255;
      const bh=2+amp*maxH;
      const x1=cx+Math.cos(ang)*innerR, y1=cy+Math.sin(ang)*innerR;
      const x2=cx+Math.cos(ang)*(innerR+bh), y2=cy+Math.sin(ang)*(innerR+bh);
      c2.strokeStyle=`rgba(37,99,235,${.3+amp*.65})`;
      c2.lineWidth=2; c2.lineCap='round';
      c2.beginPath(); c2.moveTo(x1,y1); c2.lineTo(x2,y2); c2.stroke();
    }
    const vol=getVol();
    const g=c2.createRadialGradient(cx,cy,0,cx,cy,innerR);
    g.addColorStop(0,`rgba(37,99,235,${.06+vol*.15})`);
    g.addColorStop(1,'rgba(37,99,235,0)');
    c2.fillStyle=g; c2.beginPath(); c2.arc(cx,cy,innerR,0,Math.PI*2); c2.fill();
    return;
  }

  if(curState==='speaking'){
    // Amber sine wave rings
    phase+=.05;
    for(let wi=0;wi<3;wi++){
      const rr=Math.min(w,h)*.13+wi*8;
      c2.beginPath();
      for(let i=0;i<=100;i++){
        const a=(i/100)*Math.PI*2;
        const r2=rr*(1+(.06+.03*wi)*Math.sin(a*5+phase+wi*1.4));
        const px=cx+Math.cos(a)*r2, py=cy+Math.sin(a)*r2;
        i===0?c2.moveTo(px,py):c2.lineTo(px,py);
      }
      c2.closePath();
      c2.strokeStyle=`rgba(217,119,6,${.5-wi*.12})`;
      c2.lineWidth=1.5-wi*.3; c2.stroke();
    }
    const g=c2.createRadialGradient(cx,cy,0,cx,cy,Math.min(w,h)*.38);
    g.addColorStop(0,'rgba(217,119,6,.07)'); g.addColorStop(1,'rgba(217,119,6,0)');
    c2.fillStyle=g; c2.fillRect(0,0,w,h);
    return;
  }

  if(curState==='thinking'){
    phase+=.04;
    const r=Math.min(w,h)*.28;
    c2.save(); c2.translate(cx,cy); c2.rotate(phase);
    c2.setLineDash([6,5]);
    c2.strokeStyle='rgba(124,58,237,.5)'; c2.lineWidth=1.5;
    c2.beginPath(); c2.arc(0,0,r,0,Math.PI*2); c2.stroke();
    c2.setLineDash([]); c2.restore();
    const g=c2.createRadialGradient(cx,cy,0,cx,cy,r);
    g.addColorStop(0,'rgba(124,58,237,.06)'); g.addColorStop(1,'rgba(124,58,237,0)');
    c2.fillStyle=g; c2.fillRect(0,0,w,h);
  }
}
function loop(){ draw(); animId=requestAnimationFrame(loop); }
loop();

/* ── State UI ── */
const STATES = {
  idle:    {pill:'',       cls:'',       label:'Start the agent to begin', txt:'Offline'},
  active:  {pill:'online', cls:'active', label:'Agent ready — speak now',  txt:'Online'},
  listen:  {pill:'listen', cls:'listen', label:'Listening…',               txt:'Listening'},
  speak:   {pill:'speak',  cls:'speak',  label:'Agent speaking',           txt:'Speaking'},
  think:   {pill:'think',  cls:'think',  label:'Thinking…',                txt:'Thinking'},
  stopped: {pill:'',       cls:'',       label:'Stopped',                  txt:'Offline'},
};

function applyState(s){
  curState = s;
  const cfg = STATES[s] || STATES.idle;
  const pill = document.getElementById('statePill');
  pill.className = 'state-pill ' + (cfg.pill||'');
  document.getElementById('pillText').textContent = cfg.txt;
  document.getElementById('orbCore').className = 'orb-core ' + (cfg.cls||'');
  const lbl = document.getElementById('orbLabel');
  lbl.className  = 'orb-label ' + (cfg.pill||'');
  lbl.textContent = cfg.label;
}

function setRunning(on){
  running = on;
  document.getElementById('btnStart').disabled = on;
  document.getElementById('btnStop').disabled  = !on;
  const dot = document.getElementById('liveDot');
  dot.className = 'live-dot' + (on?' on':'');
  document.getElementById('liveText').textContent = on ? 'live' : 'idle';
  if(!on) applyState('idle');
}

/* ── Transcript ── */
function nowTime(){
  return new Date().toLocaleTimeString('en-GB',{hour12:false,hour:'2-digit',minute:'2-digit'});
}
function esc(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function removeEmpty(){
  const e=document.getElementById('txEmpty');
  if(e) e.remove();
}
function removeTyping(){
  if(typingEl){typingEl.remove();typingEl=null;}
}
function showTyping(){
  removeEmpty();
  if(typingEl) return;
  const tx=document.getElementById('transcript');
  typingEl=document.createElement('div');
  typingEl.className='msg agent';
  typingEl.innerHTML=`
    <div class="av">AI</div>
    <div class="msg-body">
      <div class="bubble"><div class="tdots"><span></span><span></span><span></span></div></div>
    </div>`;
  tx.appendChild(typingEl);
  tx.scrollTop=tx.scrollHeight;
}
function addMessage(role, text){
  removeEmpty();
  removeTyping();
  const tx=document.getElementById('transcript');
  const el=document.createElement('div');
  el.className=`msg ${role}`;
  const init = role==='agent'?'AI':'You';
  el.innerHTML=`
    <div class="av">${init}</div>
    <div class="msg-body">
      <div class="bubble" dir="auto">${esc(text)}</div>
      <span class="msg-time">${nowTime()}</span>
    </div>`;
  tx.appendChild(el);
  tx.scrollTop=tx.scrollHeight;
}

/* ── Console ── */
function logClass(line){
  const l=line.toLowerCase();
  if(l.includes('error')||l.includes('traceback')) return 'err';
  if(l.includes('warn')) return 'warn';
  if(l.includes('connected')||l.includes('started')||l.includes('ok')) return 'ok';
  if(l.startsWith('transcript')||l.includes('agent_state')) return 'sys';
  return 'info';
}
function addLog(msg, cls){
  const b=document.getElementById('consoleBody');
  const el=document.createElement('div');
  el.className='log '+(cls||logClass(msg));
  const t=new Date().toLocaleTimeString('en-GB',{hour12:false});
  el.textContent=`${t}  ${msg}`;
  b.appendChild(el);
  b.scrollTop=b.scrollHeight;
  while(b.children.length>300) b.removeChild(b.firstChild);
}
function clearConsole(){ document.getElementById('consoleBody').innerHTML=''; }

/* ── SSE ── */
function startStreams(){
  if(logSSE){logSSE.close();logSSE=null;}
  logSSE=new EventSource(`${API}/logs/stream`);
  logSSE.onmessage=e=>{ if(e.data) addLog(e.data); };

  if(evtSSE){evtSSE.close();evtSSE=null;}
  evtSSE=new EventSource(`${API}/events/stream`);
  evtSSE.onmessage=e=>{
    if(!e.data||e.data.startsWith(':')) return;
    let ev; try{ev=JSON.parse(e.data);}catch{return;}

    if(ev.type==='transcript'){
      if(ev.role==='user'){
        removeTyping();
        addMessage('user', ev.text);
        applyState('think');
        showTyping();
      } else {
        removeTyping();
        addMessage('agent', ev.text);
        applyState('active');
      }
    } else if(ev.type==='state'){
      const s=ev.state;
      if(s==='listening')     {applyState('listen'); removeTyping();}
      else if(s==='speaking') {applyState('speak');  removeTyping();}
      else if(s==='thinking') {applyState('think');  showTyping();}
      else if(s==='active')   {applyState('active');}
      else if(s==='stopped')  {setRunning(false);}
    }
  };
}
function stopStreams(){
  if(logSSE){logSSE.close();logSSE=null;}
  if(evtSSE){evtSSE.close();evtSSE=null;}
}

/* ── VAD: switch to listening when user speaks ── */
let vadTimer=null;
setInterval(()=>{
  if(!running||!analyser) return;
  const vol=getVol();
  if(vol>0.06 && curState!=='speak' && curState!=='think'){
    applyState('listen');
    clearTimeout(vadTimer);
    vadTimer=setTimeout(()=>{ if(curState==='listen') applyState('active'); },700);
  }
},80);

/* ── Toast ── */
function toast(msg,ms=2800){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),ms);
}

/* ── Agent Controls ── */
async function startAgent(){
  const instructions = document.getElementById('instructions').value.trim();
  const voice = document.getElementById('voice').value;
  const model = document.getElementById('model').value;
  addLog(`Launching agent  voice=${voice}`,'sys');
  await startMic();
  try{
    const res = await fetch(`${API}/start`,{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({instructions, voice, model}),
    });
    const d = await res.json();
    addLog(d.message, d.status==='running'?'ok':'warn');
    if(d.status==='running'){
      setRunning(true);
      applyState('active');
      startStreams();
      toast('✓ Agent started');
    }
  } catch {
    addLog('Cannot reach server — is server.py running?','err');
    toast('⚠ Server not reachable');
    stopMic();
  }
}

async function stopAgent(){
  try{
    const res = await fetch(`${API}/stop`,{method:'POST'});
    const d   = await res.json();
    addLog(d.message,'warn');
    setRunning(false);
    stopStreams();
    stopMic();
    removeTyping();
    toast('Agent stopped');
  } catch { addLog('Failed to stop agent','err'); }
}

/* ── Status poll ── */
async function checkStatus(){
  try{
    const d = await(await fetch(`${API}/status`)).json();
    const on = d.status==='running';
    if(on!==running){ setRunning(on); if(on&&!evtSSE) startStreams(); }
  } catch {}
}
checkStatus();
setInterval(checkStatus, 5000);
